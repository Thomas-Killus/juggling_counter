<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="#6366f1"/>
  <!-- Top ball (white) -->
  <circle cx="256" cy="115" r="62" fill="#f1f5f9"/>
  <!-- Left ball (amber) -->
  <circle cx="135" cy="300" r="52" fill="#f59e0b"/>
  <!-- Right ball (green) -->
  <circle cx="377" cy="300" r="52" fill="#10b981"/>
  <!-- Inner left ball (lavender) -->
  <circle cx="196" cy="195" r="36" fill="#a5b4fc" opacity="0.85"/>
  <!-- Inner right ball (rose) -->
